name: tests

on:
  push:
  pull_request:

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # нативные библиотеки WeasyPrint: Pango + HarfBuzz (subset — для
      # встраивания шрифтовых субсетов в PDF)
      - name: Install Pango
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libpango-1.0-0 libpangoft2-1.0-0 libharfbuzz0b libharfbuzz-subset0

      - name: Install package
        run: pip install -e ".[dev]"

      # golden-тест внутри: фикстура «Ёё Щщ №» рендерится в PDF, текст
      # извлекается и сверяется, встраивание вшитых шрифтов проверяется —
      # квадраты ловятся автоматически
      - name: Run tests
        run: python -m pytest -q
